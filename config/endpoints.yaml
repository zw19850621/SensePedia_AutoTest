# API 端点配置

base_urls:
  platform_api: "http://10.210.0.61:8022"

endpoints:
  # 认证登录
  auth_login:
    method: "POST"
    path: "/v1/auth/login"
    body:
      username: "{username}"
      password: "{password}"
    response:
      token_field: "token"

  # 文档上传
  document_upload:
    method: "POST"
    path: "/v1/knowledge/documents/upload"
    content_type: "multipart/form-data"
    fields:
      - name: "file"
        type: "binary"
      - name: "doc_name"
        type: "text"
      - name: "language"
        type: "text"
        default: "zh-cn"
      - name: "visibility"
        type: "text"
        default: "private"
    response:
      document_id_field: "document_id"
      status_field: "status"

  # 文档状态查询
  document_status:
    method: "GET"
    path: "/v1/knowledge/documents/{document_id}"
    response:
      status_field: "status"
      parser_status_field: "parser_status"

  # 文档详情查询
  document_detail:
    method: "GET"
    path: "/v1/knowledge/documents/{document_id}"
    response:
      doc_name_field: "doc_name"
      document_id_field: "document_id"

  # 文档发布/解析
  document_publish:
    method: "POST"
    path: "/v1/knowledge/documents/{document_id}/publish"
    body: {}
    response:
      job_id_field: "job_id"
      status_field: "status"

  # ======================
  # RAG 问答会话管理
  # ======================

  # 创建会话
  rag_create_session:
    method: "POST"
    path: "/v1/rag/sessions"
    body:
      title: "{title}"
    response:
      session_id_field: "session_id"
      title_field: "title"

  # 获取会话详情
  rag_get_session:
    method: "GET"
    path: "/v1/rag/sessions/{session_id}"

  # 更新会话
  rag_update_session:
    method: "PATCH"
    path: "/v1/rag/sessions/{session_id}"
    body:
      title: "{title}"
      pinned: "{pinned}"

  # 创建消息
  rag_create_message:
    method: "POST"
    path: "/v1/rag/sessions/{session_id}/messages"
    body:
      role: "user"
      content: "{content}"
      citations: []
      scope_mode: "{scope_mode}"
      knowledge_base_id: "{knowledge_base_id}"
      doc_ids: []
      #chat_mode: "flex"--Flexible Skills，pipeline--Fixed Pipeline
      chat_mode: "flex"
    response:
      message_id_field: "message_id"

  # 流式查询
  # 注意：根据 rag_create_message 的 chat_mode 自动选择接口路径
  #   flex (Flexible Skills)     → /v1/rag/flex/query/stream
  #   pipeline (Fixed Pipeline)  → /v1/rag/query/stream
  rag_query_stream:
    method: "POST"
    path: "/v1/rag/query/stream"
    body:
      top_k: 30
      rerank: true
      stream: true
      citation_mode: "inline"
      model: "qwen3.5-27b-local"
      enable_thinking: false
      scope_mode: "all"
      doc_ids: []
      # 异常检测关键字：提取答案时如果 data.delta 包含这些关键字则打印告警
      alert_keywords:
        - "已达到最大工具调用轮次"
        - "工具调用失败"
